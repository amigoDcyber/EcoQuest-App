spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ecoquestdb}
    username: ${DB_USERNAME:backend}
    password: ${DB_PASSWORD:apple}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

# Google API Configuration
google:
  api:
    key: ${GOOGLE_API_KEY:}
